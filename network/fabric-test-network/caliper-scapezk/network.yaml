name: scapezk-fabric
version: '2.0.0'

caliper:
  blockchain: fabric

channels:
  - channelName: scapechannel
    contracts:
      - id: scapezk

organizations:
  - mspid: Org1MSP
    identities:
      certificates:
        - name: Admin@org1.example.com
          clientPrivateKey:
            path: ../organizations/peerOrganizations/org1.example.com/users/Admin@org1.example.com/msp/keystore/priv_sk
          clientSignedCert:
            path: ../organizations/peerOrganizations/org1.example.com/users/Admin@org1.example.com/msp/signcerts/Admin@org1.example.com-cert.pem
    peers:
      - endpoint: localhost:7051
        tlsCACerts:
          path: ../organizations/peerOrganizations/org1.example.com/peers/peer0.org1.example.com/tls/ca.crt
        grpcOptions:
          ssl-target-name-override: peer0.org1.example.com
          hostnameOverride: peer0.org1.example.com
      - endpoint: localhost:8051
        tlsCACerts:
          path: ../organizations/peerOrganizations/org1.example.com/peers/peer1.org1.example.com/tls/ca.crt
        grpcOptions:
          ssl-target-name-override: peer1.org1.example.com
          hostnameOverride: peer1.org1.example.com

  - mspid: Org2MSP
    identities:
      certificates:
        - name: Admin@org2.example.com
          clientPrivateKey:
            path: ../organizations/peerOrganizations/org2.example.com/users/Admin@org2.example.com/msp/keystore/priv_sk
          clientSignedCert:
            path: ../organizations/peerOrganizations/org2.example.com/users/Admin@org2.example.com/msp/signcerts/Admin@org2.example.com-cert.pem
    peers:
      - endpoint: localhost:9051
        tlsCACerts:
          path: ../organizations/peerOrganizations/org2.example.com/peers/peer0.org2.example.com/tls/ca.crt
        grpcOptions:
          ssl-target-name-override: peer0.org2.example.com
          hostnameOverride: peer0.org2.example.com
      - endpoint: localhost:10051
        tlsCACerts:
          path: ../organizations/peerOrganizations/org2.example.com/peers/peer1.org2.example.com/tls/ca.crt
        grpcOptions:
          ssl-target-name-override: peer1.org2.example.com
          hostnameOverride: peer1.org2.example.com
