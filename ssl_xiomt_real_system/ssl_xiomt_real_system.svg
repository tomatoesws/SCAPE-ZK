<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="1080" viewBox="0 0 1600 1080">
  <defs>
    <style>
      .bg { fill: #f6f1e8; }
      .title { font: 700 32px Georgia, serif; fill: #1f2a2e; }
      .subtitle { font: 400 18px Georgia, serif; fill: #445056; }
      .domain { fill: #fffaf1; stroke: #b98e48; stroke-width: 3; rx: 28; ry: 28; }
      .chain { fill: #e8f1ef; stroke: #2f6f69; stroke-width: 3; rx: 24; ry: 24; }
      .storage { fill: #eef3fb; stroke: #3e6ea8; stroke-width: 3; rx: 24; ry: 24; }
      .actor { fill: #fff; stroke: #3a4a52; stroke-width: 2.5; rx: 20; ry: 20; }
      .phase { fill: #1f2a2e; font: 700 18px Arial, sans-serif; }
      .label { font: 600 18px Arial, sans-serif; fill: #1f2a2e; }
      .text { font: 400 16px Arial, sans-serif; fill: #2d3539; }
      .small { font: 400 14px Arial, sans-serif; fill: #2d3539; }
      .note { font: 600 15px Arial, sans-serif; fill: #7b4f00; }
      .arrowA { stroke: #9d5c0d; stroke-width: 3.5; fill: none; marker-end: url(#arrow); }
      .arrowB { stroke: #2f6f69; stroke-width: 3.5; fill: none; marker-end: url(#arrow2); }
      .arrowC { stroke: #3e6ea8; stroke-width: 3.5; fill: none; marker-end: url(#arrow3); }
      .step { fill: #9d5c0d; font: 700 17px Arial, sans-serif; }
    </style>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#9d5c0d"/>
    </marker>
    <marker id="arrow2" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#2f6f69"/>
    </marker>
    <marker id="arrow3" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#3e6ea8"/>
    </marker>
  </defs>

  <rect class="bg" x="0" y="0" width="1600" height="1080"/>

  <text class="title" x="70" y="62">SSL-XIoMT Real System Architecture</text>
  <text class="subtitle" x="70" y="92">Faithful reconstruction from the IEEE OJ-CS 2025 paper. This diagram shows the paper's actual claimed full system, not a local runtime implementation.</text>

  <rect class="domain" x="60" y="140" width="610" height="760"/>
  <text class="label" x="90" y="180">Domain A: requester side</text>

  <rect class="domain" x="930" y="140" width="610" height="760"/>
  <text class="label" x="960" y="180">Domain B: owner/data side</text>

  <rect class="chain" x="520" y="230" width="560" height="120"/>
  <text class="label" x="565" y="270">Hyperledger Consortium</text>
  <text class="text" x="565" y="300">Cross-domain smart contracts for SSI validation,</text>
  <text class="text" x="565" y="324">authorization checks, logging, and Merkle-root retrieval</text>

  <rect class="actor" x="100" y="230" width="210" height="120"/>
  <text class="label" x="130" y="270">Data User + SSI Wallet</text>
  <text class="text" x="130" y="298">DID, VC, query, ZKP</text>
  <text class="text" x="130" y="322">localAuth / crossAuthUser</text>

  <rect class="chain" x="350" y="400" width="260" height="120"/>
  <text class="label" x="385" y="440">Local Blockchain A</text>
  <text class="text" x="385" y="468">local identity check</text>
  <text class="text" x="385" y="492">query forwarding</text>

  <rect class="actor" x="110" y="590" width="250" height="150"/>
  <text class="label" x="145" y="630">Fog / Proxy A</text>
  <text class="text" x="145" y="658">receives cross-domain payload</text>
  <text class="text" x="145" y="682">verifies ZKP + Merkle proof</text>
  <text class="text" x="145" y="706">decrypts transfer package</text>

  <rect class="storage" x="400" y="610" width="220" height="110"/>
  <text class="label" x="435" y="650">Local State A</text>
  <text class="text" x="435" y="678">RV2 / session material</text>

  <rect class="actor" x="980" y="230" width="220" height="120"/>
  <text class="label" x="1015" y="270">Data Owner</text>
  <text class="text" x="1015" y="298">owns EHR, sets policy</text>
  <text class="text" x="1015" y="322">AES encrypt + split key</text>

  <rect class="chain" x="1240" y="400" width="250" height="120"/>
  <text class="label" x="1275" y="440">Local Blockchain B</text>
  <text class="text" x="1275" y="468">credential state</text>
  <text class="text" x="1275" y="492">auth result + routing</text>

  <rect class="actor" x="980" y="590" width="250" height="170"/>
  <text class="label" x="1015" y="630">Fog / Proxy B</text>
  <text class="text" x="1015" y="658">partial CP-ABE encrypt</text>
  <text class="text" x="1015" y="682">policy-tree pre-computation</text>
  <text class="text" x="1015" y="706">PRE / ECC transfer package</text>
  <text class="text" x="1015" y="730">integrity bundle generation</text>

  <rect class="storage" x="1270" y="610" width="220" height="140"/>
  <text class="label" x="1335" y="650">IPFS</text>
  <text class="text" x="1305" y="678">encrypted EHR</text>
  <text class="text" x="1305" y="702">encrypted key material</text>
  <text class="text" x="1305" y="726">CID / hash for integrity</text>

  <rect class="actor" x="640" y="430" width="320" height="170"/>
  <text class="label" x="675" y="470">Adaptive ZKP Layer</text>
  <text class="text" x="675" y="500">suspicious / unseen user: ZK-STARK</text>
  <text class="text" x="675" y="526">verified user: PLONK</text>
  <text class="text" x="675" y="552">MPC-assisted proof handling</text>
  <text class="text" x="675" y="578">off-chain batching with zk-Rollups</text>

  <path class="arrowA" d="M310 290 C380 290, 430 290, 520 290"/>
  <text class="step" x="360" y="276">2</text>
  <text class="small" x="325" y="248">VC / DID validation</text>

  <path class="arrowA" d="M1200 290 C1130 290, 1110 290, 1080 290"/>
  <text class="step" x="1140" y="276">4</text>
  <text class="small" x="1100" y="248">owner state / policy context</text>

  <path class="arrowB" d="M450 400 C520 360, 620 350, 720 430"/>
  <text class="step" x="555" y="382">3</text>
  <text class="small" x="500" y="420">VC + ZKP auth</text>

  <path class="arrowB" d="M960 515 C1030 470, 1110 430, 1240 460"/>
  <text class="step" x="1095" y="452">3</text>
  <text class="small" x="1040" y="490">auth result / logging</text>

  <path class="arrowC" d="M1090 350 C1090 430, 1090 505, 1090 590"/>
  <text class="step" x="1110" y="470">4</text>
  <text class="small" x="1125" y="492">AES encrypt, RV1/RV2 split</text>

  <path class="arrowC" d="M1230 675 C1260 675, 1270 675, 1270 675"/>
  <text class="step" x="1242" y="660">5</text>
  <text class="small" x="1110" y="780">AND &gt; MofN &gt; OR policy ordering</text>

  <path class="arrowA" d="M1230 630 C1285 560, 1340 530, 1365 520"/>
  <text class="step" x="1286" y="570">6</text>
  <text class="small" x="1245" y="548">CID / metadata / route</text>

  <path class="arrowA" d="M1240 470 C1120 430, 1040 390, 1080 350"/>
  <text class="step" x="1168" y="410">6</text>
  <text class="small" x="1100" y="382">cross-domain approval</text>

  <path class="arrowC" d="M980 710 C860 770, 560 790, 360 680"/>
  <text class="step" x="690" y="800">7</text>
  <text class="small" x="620" y="826">PRE / ECC package + integrity bundle</text>

  <path class="arrowB" d="M360 650 C430 650, 460 650, 400 650"/>
  <text class="step" x="382" y="638">8</text>
  <text class="small" x="360" y="754">recover RV2, rebuild RV, CP-ABE decrypt RV1, AES decrypt EHR</text>

  <path class="arrowB" d="M230 350 C230 440, 230 510, 230 590"/>
  <text class="step" x="248" y="490">1</text>
  <text class="small" x="90" y="540">request starts with user DID, VC, and query</text>

  <rect class="actor" x="70" y="930" width="1460" height="105"/>
  <text class="phase" x="100" y="968">Paper-defined phase summary</text>
  <text class="text" x="100" y="995">1. SSI identity presentation  2. DID/VC validation on Hyperledger  3. Adaptive ZKP authorization via ZK-STARK or PLONK with MPC + zk-Rollups</text>
  <text class="text" x="100" y="1018">4. DO encrypts EHR with AES and splits key into RV1/RV2  5. Fog proxy performs CP-ABE + policy pre-computation  6. Cross-domain sharing through local chains</text>
  <text class="text" x="100" y="1041">7. PRE/ECC transfer with IPFS-backed integrity  8. Authorized DU reconstructs key material and decrypts the EHR</text>

  <text class="note" x="1160" y="82">No fabricated timings in this diagram.</text>
</svg>
