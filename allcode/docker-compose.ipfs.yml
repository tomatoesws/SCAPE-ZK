services:
  kubo:
    image: ipfs/kubo:v0.29.0
    container_name: scape-ipfs
    restart: unless-stopped
    ports:
      - "4001:4001/tcp"
      - "4001:4001/udp"
      - "127.0.0.1:5001:5001"
      - "127.0.0.1:8080:8080"
    volumes:
      - ipfs_data:/data/ipfs
      - ipfs_staging:/export
    environment:

      - IPFS_PROFILE=server
    healthcheck:
      test: ["CMD", "ipfs", "id"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  ipfs_data:
  ipfs_staging:
