test:
  name: scapezk-register-load
  description: SCAPE-ZK Fabric Register TPS and latency benchmark at 100/500/1000 transaction load.
  workers:
    number: 4
  rounds:
    - label: register-100tx
      description: Submit 100 Register transactions.
      txNumber: 100
      rateControl:
        type: fixed-load
        opts:
          transactionLoad: 20
      workload:
        module: ./workloads/register.js
        arguments:
          contractId: scapezk
          operation: Register
          prefix: caliper100

    - label: register-500tx
      description: Submit 500 Register transactions.
      txNumber: 500
      rateControl:
        type: fixed-load
        opts:
          transactionLoad: 50
      workload:
        module: ./workloads/register.js
        arguments:
          contractId: scapezk
          operation: Register
          prefix: caliper500

    - label: register-1000tx
      description: Submit 1000 Register transactions.
      txNumber: 1000
      rateControl:
        type: fixed-load
        opts:
          transactionLoad: 100
      workload:
        module: ./workloads/register.js
        arguments:
          contractId: scapezk
          operation: Register
          prefix: caliper1000

monitors:
  resource:
    - module: docker
      options:
        interval: 1
        containers:
          - peer0.org1.example.com
          - peer1.org1.example.com
          - peer0.org2.example.com
          - peer1.org2.example.com
          - orderer.example.com
