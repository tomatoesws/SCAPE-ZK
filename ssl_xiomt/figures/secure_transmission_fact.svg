<text x="60" y="70" class="title" text-anchor="start">Secure Cross-Domain Transmission</text>
<text x="60" y="100" class="subtitle" text-anchor="start">The paper text does not expose Table 3 cell values in extractable form</text>
<rect x="80" y="150" width="840" height="250" rx="18" fill="#f0f9ff" stroke="#7dd3fc" stroke-width="2"/>
<text x="500" y="250" class="title" text-anchor="middle">All compared schemes completed the end-to-end process in under 0.1 seconds.</text>
<text x="500" y="305" class="note" text-anchor="middle">This figure intentionally avoids invented per-step or per-scheme timings.</text>
