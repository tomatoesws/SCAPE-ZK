test:
  name: scapezk-operation-load-txlog
  description: SCAPE-ZK operation benchmark with per-transaction Caliper TxStatus logging.
  workers:
    number: 4
  rounds:
    - label: register-100tx
      txNumber: 100
      rateControl: &rate100
        type: fixed-load
        opts:
          transactionLoad: 20
      workload: &registerWorkload
        module: ./workloads/operation.js
        arguments:
          contractId: scapezk
          operation: Register
          prefix: op-register-rerun

    - label: register-500tx
      txNumber: 500
      rateControl: &rate500
        type: fixed-load
        opts:
          transactionLoad: 50
      workload: *registerWorkload

    - label: register-1000tx
      txNumber: 1000
      rateControl: &rate1000
        type: fixed-load
        opts:
          transactionLoad: 100
      workload: *registerWorkload

    - label: verifyproof-100tx
      txNumber: 100
      rateControl: *rate100
      workload: &verifyProofWorkload
        module: ./workloads/operation.js
        arguments:
          contractId: scapezk
          operation: VerifyProof
          prefix: op-verifyproof-rerun

    - label: verifyproof-500tx
      txNumber: 500
      rateControl: *rate500
      workload: *verifyProofWorkload

    - label: verifyproof-1000tx
      txNumber: 1000
      rateControl: *rate1000
      workload: *verifyProofWorkload

    - label: revoke-100tx
      txNumber: 100
      rateControl: *rate100
      workload: &revokeWorkload
        module: ./workloads/operation.js
        arguments:
          contractId: scapezk
          operation: Revoke
          prefix: op-revoke-rerun

    - label: revoke-500tx
      txNumber: 500
      rateControl: *rate500
      workload: *revokeWorkload

    - label: revoke-1000tx
      txNumber: 1000
      rateControl: *rate1000
      workload: *revokeWorkload

    - label: updatecred-100tx
      txNumber: 100
      rateControl: *rate100
      workload: &updateCredWorkload
        module: ./workloads/operation.js
        arguments:
          contractId: scapezk
          operation: UpdateCred
          prefix: op-updatecred-rerun

    - label: updatecred-500tx
      txNumber: 500
      rateControl: *rate500
      workload: *updateCredWorkload

    - label: updatecred-1000tx
      txNumber: 1000
      rateControl: *rate1000
      workload: *updateCredWorkload

    - label: recordexists-100tx
      txNumber: 100
      rateControl: *rate100
      workload: &recordExistsWorkload
        module: ./workloads/operation.js
        arguments:
          contractId: scapezk
          operation: RecordExists
          prefix: op-recordexists-rerun

    - label: recordexists-500tx
      txNumber: 500
      rateControl: *rate500
      workload: *recordExistsWorkload

    - label: recordexists-1000tx
      txNumber: 1000
      rateControl: *rate1000
      workload: *recordExistsWorkload

monitors:
  transaction:
    - module: logging
      options:
        loggerModuleName: txInfo
        messageLevel: info
  resource:
    - module: docker
      options:
        interval: 1
        containers:
          - peer0.org1.example.com
          - peer1.org1.example.com
          - peer0.org2.example.com
          - peer1.org2.example.com
          - orderer.example.com
